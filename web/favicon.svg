<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" shape-rendering="crispEdges">
  <title>javuto.net</title>
  <style>
    @media (prefers-reduced-motion: reduce) {
      animate, animateTransform { display: none; }
    }
  </style>

  <defs>
    <!-- reusable skull glyph -->
    <symbol id="skull" overflow="visible">
      <!-- cranium -->
      <ellipse cx="16" cy="11.5" rx="8.5" ry="7.6" fill="currentColor"/>
      <!-- cheeks + jaw -->
      <path d="M7.8 12.5 Q7.4 19 10.6 20.4 L10.8 24.4 L21.2 24.4 L21.4 20.4 Q24.6 19 24.2 12.5 Z"
            fill="currentColor"/>
      <!-- brow shade -->
      <path d="M9 13 Q16 10 23 13" fill="none" stroke="#008f11" stroke-width="0.7" opacity="0.6"/>
      <!-- eye sockets -->
      <ellipse cx="12" cy="14" rx="2.5" ry="3" fill="#000300"/>
      <ellipse cx="20" cy="14" rx="2.5" ry="3" fill="#000300"/>
      <!-- nose -->
      <path d="M16 17.4 L14.4 20.4 L17.6 20.4 Z" fill="#000300"/>
      <!-- teeth gaps -->
      <rect x="12.6" y="20.6" width="0.7" height="3.6" fill="#000300"/>
      <rect x="15.65" y="20.6" width="0.7" height="3.6" fill="#000300"/>
      <rect x="18.7" y="20.6" width="0.7" height="3.6" fill="#000300"/>
      <rect x="10.8" y="22.4" width="10.4" height="0.6" fill="#000300" opacity="0.5"/>
    </symbol>

    <!-- CRT scanline mask -->
    <pattern id="scan" width="1" height="2" patternUnits="userSpaceOnUse">
      <rect width="1" height="1" y="0" fill="#000300" opacity="0.22"/>
    </pattern>
    <!-- soft glow -->
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="0.9" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- screen -->
  <rect x="0" y="0" width="32" height="32" fill="#000300"/>
  <rect x="1.5" y="1.5" width="29" height="29" rx="4" fill="none" stroke="#008f11" stroke-width="1"/>
  <rect x="1.5" y="1.5" width="29" height="29" rx="4" fill="none" stroke="#00ff41" stroke-width="0.5" opacity="0.55"/>

  <!-- glitch layer group -->
  <g filter="url(#glow)">
    <!-- red ghost -->
    <g color="#ff004d" opacity="0.9">
      <use href="#skull">
        <animateTransform attributeName="transform" type="translate"
          values="0 0;-2 0;0 0;2 0;0 0" dur="2.6s" repeatCount="indefinite"
          keyTimes="0;0.93;0.96;0.98;1"/>
        <animate attributeName="opacity" values="0;0;1;0;0;1" dur="2.6s" repeatCount="indefinite"
          keyTimes="0;0.9;0.93;0.97;0.99;1"/>
      </use>
    </g>
    <!-- cyan ghost -->
    <g color="#00e5ff" opacity="0.9">
      <use href="#skull">
        <animateTransform attributeName="transform" type="translate"
          values="0 0;2 0;0 0;-2 0;0 0" dur="2.6s" repeatCount="indefinite"
          keyTimes="0;0.93;0.96;0.98;1" begin="0.04s"/>
        <animate attributeName="opacity" values="0;0;1;0;0;1" dur="2.6s" repeatCount="indefinite"
          keyTimes="0;0.9;0.93;0.97;0.99;1" begin="0.04s"/>
      </use>
    </g>

    <!-- main glyph -->
    <g color="#00ff41">
      <use href="#skull">
        <animate attributeName="opacity" values="1;1;0.55;1;1" dur="3.5s" repeatCount="indefinite"
          keyTimes="0;0.55;0.57;0.6;1"/>
      </use>
    </g>

    <!-- blinking cursor -->
    <rect x="22" y="21.5" width="2.2" height="4.5" fill="#00ff41">
      <animate attributeName="opacity" values="1;1;0;0" dur="1.05s" repeatCount="indefinite"
        keyTimes="0;0.49;0.5;1"/>
    </rect>
  </g>

  <!-- scanlines + vignette overlays -->
  <rect x="0" y="0" width="32" height="32" fill="url(#scan)" pointer-events="none"/>
  <rect x="1.5" y="1.5" width="29" height="29" rx="4" fill="none" stroke="#000300" stroke-width="2" opacity="0.15"/>
</svg>